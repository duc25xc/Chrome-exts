<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AdBlocker Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
      body {
        width: 300px;
        font-family: 'Poppins', 'Inter', Arial, sans-serif;
        padding: 10px;
      }
      h4 {
        margin: 10px 0 5px 0;
        color: #333;
        border-bottom: 1px solid #eee;
        padding-bottom: 3px;
      }
      .toggle-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        margin-bottom: 10px;
      }
      .toggle-btn {
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      .enabled {
        background-color: #4caf50; 
        color: white;
      }
      .disabled {
        background-color: #f44336; 
        color: white;
      }
      .info-stat {
        font-size: 0.9em;
        margin-bottom: 5px;
      }
      .info-stat span {
        font-weight: bold;
        color: #007bff;
      }
      #log-list {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 5px;
        list-style: none;
        margin: 0;
      }
      #log-list li {
        padding: 3px 0;
        border-bottom: 1px dotted #eee;
        font-size: 0.8em;
      }
      .total-count {
        font-weight: bold;
        color: green;
      }
      .footer-section {
        padding-top: 10px;
        border-top: 1px solid #eee;
        text-align: center;
        font-size: 0.75em;
        color: #777;
      }
      .support-btn {
        background-color: #fff;
        border-color: red;
        color: red;
        padding: 5px 10px;
        border: none;
        border-radius: 4px;
        border: 1px solid red;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 8px;
        display: inline-flex;
        align-items: center;
        text-decoration: none; 
      }
      .support-btn i {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div class="toggle-section">
      <h4 style="border-bottom: none">🛡️ AdBlocker Status</h4>
      <button id="toggleAdBlock" class="toggle-btn">Đang Tải...</button>
    </div>

    <div class="info-stat">
      Tên miền hiện tại: <span id="currentDomain">Đang tải...</span>
    </div>

    <p class="info-stat">
      Tổng số QC đã đóng: <span id="totalCount" class="total-count">0</span>
    </p>
    <ul id="log-list">
      <li>Đang tải...</li>
    </ul>

    <div class="footer-section">
      <a
        href="https://www.facebook.com/haduc.25.09"
        target="_blank"
        class="support-btn"
      >
        <i class="fa-brands fa-facebook-messenger"></i>
        Hỗ trợ / Báo lỗi
      </a>

      <p>
        Dev by ducOwO |
        <a
          href="https://github.com/haduc25"
          target="_blank"
          style="color: #007bff; text-decoration: none"
          >GitHub</a
        >
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
